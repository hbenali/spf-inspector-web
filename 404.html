<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 · page not found · SPF checker</title>
  <meta name="robots" content="noindex, follow">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f0fff5 0%, #e9faee 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: #1a2639;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(20, 100, 60, 0.25), inset 0 1px 2px rgba(255,255,255,0.8);
      width: 100%;
      max-width: 700px;
      padding: 3rem 2.5rem;
      border: 1px solid rgba(255,255,255,0.5);
      text-align: center;
    }

    .error-code {
      font-size: 8rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #2f6b4a, #5bd58a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.03em;
    }

    .divider {
      width: 80px;
      height: 4px;
      background: linear-gradient(90deg, #5bd58a, #bbffbb);
      border-radius: 2px;
      margin: 1.5rem auto;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #2f6b4a;
      margin-bottom: 1rem;
    }

    .message {
      font-size: 1.2rem;
      color: #4e775a;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    .domain-preview {
      background: rgba(91, 213, 138, 0.1);
      border-radius: 60px;
      padding: 0.8rem 1.8rem;
      display: inline-block;
      margin-bottom: 2rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 1.1rem;
      color: #2f6b4a;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .primary-btn {
      background: #2f6b4a;
      border: none;
      padding: 1rem 2.3rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.05rem;
      color: white;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 12px 22px -10px #2f6b4a;
      transition: all 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.3);
      text-decoration: none;
    }

    .primary-btn:hover {
      background: #1f5b3a;
      transform: scale(1.02);
      box-shadow: 0 18px 28px -10px #1f5b3a;
    }

    .secondary-btn {
      background: white;
      color: #2f6b4a;
      border: 2px solid #bbffbb;
      padding: 1rem 2.3rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      text-decoration: none;
      box-shadow: 0 6px 12px -8px #2f6b4a70;
    }

    .secondary-btn:hover {
      background: #e9ffe9;
      border-color: #5bd58a;
      transform: scale(1.01);
    }

    .help-links {
      margin-top: 2.5rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .help-link {
      color: #4e775a;
      text-decoration: none;
      font-size: 0.95rem;
      border-bottom: 1px dotted #5bd58a;
    }

    .help-link:hover {
      color: #2f6b4a;
      border-bottom: 2px solid #2f6b4a;
    }

    footer {
      margin-top: 2.5rem;
      color: #6a9a6a;
      font-size: 0.9rem;
    }

    footer a {
      color: #2f6b4a;
      text-decoration: none;
      border-bottom: 1px dotted;
    }

    footer a:hover {
      border-bottom: 2px solid;
    }

    .globe-icon {
      font-size: 1.5rem;
      margin-right: 0.3rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <div class="error-code">404</div>
    <div class="divider"></div>
    
    <h1>Page not found</h1>
    
    <div class="message">
      The SPF record or page you're looking for doesn't exist.
    </div>

    <div class="domain-preview">
      <span class="globe-icon">📧</span> spf.hbenali.ovh
    </div>

    <div class="action-buttons">
      <a href="/" class="primary-btn">
        <span>🏠</span> Go to homepage
      </a>
      <a href="/" class="secondary-btn">
        <span>🔍</span> Check SPF records
      </a>
    </div>

    <div class="help-links">
      <a href="/" class="help-link">🏠 Home</a>
      <a href="/sitemap.xml" class="help-link">📋 Sitemap</a>
      <a href="https://github.com/yourusername/spf-checker" class="help-link" target="_blank">📘 GitHub</a>
    </div>

    <footer>
      <a href="/">SPF record checker</a> · prevent email spoofing
    </footer>
  </div>
</body>
</html>
