<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2f6b4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a9f6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="100" height="100" rx="20" fill="url(#bgGradient)"/>
  
  <!-- Envelope icon for email -->
  <path d="M20 30 L80 30 L80 70 L20 70 L20 30" stroke="white" stroke-width="4" fill="none"/>
  <path d="M20 30 L50 50 L80 30" stroke="white" stroke-width="4" fill="none"/>
  
  <!-- SPF text -->
  <text x="50" y="85" font-size="20" text-anchor="middle" fill="white" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-weight="600">SPF</text>
  
  <!-- Small decorative checkmark -->
  <circle cx="75" cy="45" r="5" fill="white" opacity="0.8"/>
  <path d="M72 45 L75 48 L80 42" stroke="#2f6b4a" stroke-width="2" fill="none"/>
</svg>